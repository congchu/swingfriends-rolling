<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단체사진 | 스윙프렌즈</title>
  <meta name="description" content="스윙프렌즈 102기의 추억을 모아봤어요">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://swing-rincho.netlify.app/gallery.html">
  <meta property="og:title" content="단체사진 | 스윙프렌즈">
  <meta property="og:description" content="스윙프렌즈 102기의 추억을 모아봤어요">
  <meta property="og:image" content="https://swing-rincho.netlify.app/images/people/0-group/34.jpeg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="단체사진 | 스윙프렌즈">
  <meta name="twitter:description" content="스윙프렌즈 102기의 추억을 모아봤어요">
  <meta name="twitter:image" content="https://swing-rincho.netlify.app/images/people/0-group/34.jpeg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'RoundedFixedsys';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'RoundedFixedsys', monospace;
      color: #fff;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255,180,220,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 30%, rgba(200,160,255,.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(255,200,150,.2) 0%, transparent 50%),
        linear-gradient(160deg, #2a1028 0%, #1a0a2e 40%, #0d0520 100%);
      background-attachment: fixed;
    }

    /* nav */
    .gallery-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: rgba(10,5,20,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,140,160,.2);
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: .95rem;
      color: rgba(255,180,210,.8);
      padding: 6px 14px;
      border: 1px solid rgba(255,140,160,.3);
      border-radius: 20px;
      transition: all .2s;
    }
    .nav-back:hover {
      background: rgba(255,100,140,.15);
      color: #fff;
    }

    .nav-title {
      font-size: 1.1rem;
      letter-spacing: .1em;
      color: rgba(255,200,220,.8);
    }

    /* content */
    .gallery-header {
      text-align: center;
      padding: 48px 20px 24px;
    }

    .gallery-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      letter-spacing: .06em;
      text-shadow: 0 0 30px rgba(255,105,180,.3);
      margin-bottom: 8px;
    }

    .gallery-header p {
      font-size: clamp(.8rem, 1.6vw, .95rem);
      color: rgba(255,200,220,.5);
      letter-spacing: .12em;
    }

    /* masonry grid */
    .gallery-grid {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 80px;
      columns: 3;
      column-gap: 12px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 12px;
      overflow: hidden;
      border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      background: #2a2a2a;
      transition: transform .3s, box-shadow .3s;
      cursor: pointer;
    }
    .gallery-item:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .gallery-item img {
      width: 100%;
      display: block;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .empty-text {
      font-size: 1.2rem;
      color: rgba(255,200,230,.8);
      margin-bottom: 8px;
    }
    .empty-sub {
      font-size: .9rem;
      color: rgba(255,180,210,.5);
    }

    /* lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s, visibility .3s;
      cursor: pointer;
    }
    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255,255,255,.7);
      font-size: 2rem;
      cursor: pointer;
    }
    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.3);
      background: rgba(0,0,0,.5);
      color: rgba(255,255,255,.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      z-index: 10;
    }
    .lightbox-arrow:hover {
      background: rgba(255,100,140,.3);
      border-color: rgba(255,140,160,.7);
      color: #fff;
    }
    .lightbox-arrow--left { left: 16px; }
    .lightbox-arrow--right { right: 16px; }
    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .9rem;
      color: rgba(255,255,255,.5);
      letter-spacing: .1em;
    }

    @media (max-width: 600px) {
      .gallery-grid {
        columns: 2;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <nav class="gallery-nav">
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      홈
    </a>
    <span class="nav-title">단체사진</span>
  </nav>

  <div class="gallery-header">
    <h1>단체사진 모아보기</h1>
    <p>함께한 순간들</p>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <p class="empty-emoji">📷</p>
    <p class="empty-text">아직 단체사진이 없어요</p>
    <p class="empty-sub">곧 추가될 예정이에요!</p>
  </div>

  <!-- lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-arrow lightbox-arrow--left" id="lbPrev">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img src="" alt="단체사진" id="lightboxImg">
    <button class="lightbox-arrow lightbox-arrow--right" id="lbNext">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <span class="lightbox-counter" id="lbCounter"></span>
  </div>

  <script src="js/paths.js"></script>
  <script>
    const grid = document.getElementById('galleryGrid');
    const empty = document.getElementById('emptyState');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    const lbCounter = document.getElementById('lbCounter');
    let currentIdx = 0;
    let srcs = [];

    function showPhoto(idx) {
      currentIdx = (idx + srcs.length) % srcs.length;
      lightboxImg.src = srcs[currentIdx];
      lbCounter.textContent = (currentIdx + 1) + ' / ' + srcs.length;
    }

    if (!GROUP_PHOTOS || GROUP_PHOTOS.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
    } else {
      srcs = GROUP_PHOTOS.map(function(file) {
        return PEOPLE_DIR + '/' + GROUP_FOLDER + '/' + file;
      });

      grid.innerHTML = srcs.map(function(src) {
        return '<div class="gallery-item"><img src="' + src + '" alt="단체사진" loading="lazy"></div>';
      }).join('');

      grid.addEventListener('click', function(e) {
        var item = e.target.closest('.gallery-item');
        if (item) {
          var items = Array.from(grid.querySelectorAll('.gallery-item'));
          showPhoto(items.indexOf(item));
          lightbox.classList.add('active');
        }
      });
    }

    lbPrev.addEventListener('click', function(e) {
      e.stopPropagation();
      showPhoto(currentIdx - 1);
    });
    lbNext.addEventListener('click', function(e) {
      e.stopPropagation();
      showPhoto(currentIdx + 1);
    });

    // 배경 클릭으로 닫기 (화살표/이미지 제외)
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox || e.target.classList.contains('lightbox-close')) {
        lightbox.classList.remove('active');
      }
    });

    // 키보드 좌우 화살표
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') showPhoto(currentIdx - 1);
      else if (e.key === 'ArrowRight') showPhoto(currentIdx + 1);
      else if (e.key === 'Escape') lightbox.classList.remove('active');
    });
  </script>
</body>
</html>
