<body class="person-body">

  <!-- ===== LOADING ===== -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ddakji">
      <div class="ddakji-inner">
        <div class="ddakji-front">
          <img src="" alt="" id="ddakjiImg">
        </div>
        <div class="ddakji-back">
          <img src="" alt="" id="ddakjiImgBack">

  </div>
  <style>
    /* ── 레트로 게임 캐릭터 셀렉트 히어로 ── */
    @font-face {
      font-family: 'OmuDaye';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-01@1.0/omyu_pretty.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'RoundedFixedsys';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-display: swap;
    }

    .char-hero {
      background: transparent;
      padding: 40px 20px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
    }

    .char-box {
      position: relative;
      width: 100%;
      max-width: 920px;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.04) 39px, rgba(255,255,255,.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.04) 39px, rgba(255,255,255,.04) 40px),
        #0a0a14;
      border: 2px solid rgba(255,140,160,.55);
      border-radius: 20px;
      padding: 40px 36px 28px;
      box-shadow:
        0 0 30px rgba(255,100,140,.15),
        0 0 60px rgba(255,100,140,.06),
        inset 0 0 60px rgba(255,100,140,.03);
      overflow: hidden;
    }


    .char-inner {
      display: flex;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .char-inner > * {
      width: 100%;
    }

    /* 왼쪽 텍스트 */
    .char-info {
      flex: 1;
      min-width: 0;
    }

    .char-sub {
      display: block;
      font-family: 'RoundedFixedsys', monospace;
      font-size: 0.8rem;
      letter-spacing: .15em;
      color: rgba(255,140,160,.7);
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .char-name {
      font-family: 'RoundedFixedsys', monospace;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 24px;
      text-shadow:
        0 0 10px rgba(255,255,255,.15);
      letter-spacing: .04em;
    }

    /* 세그먼트 스탯 바 */
    .char-stats {
      display: flex;
      gap: 18px;
      margin-bottom: 12px;
    }

    .char-stat {
      flex: 1;
    }

    .char-stat-label {
      display: block;
      font-family: 'RoundedFixedsys', monospace;
      font-size: .85rem;
      letter-spacing: .12em;
      color: rgba(255,255,255,.45);
      margin-bottom: 6px;
    }

    .char-stat-bar {
      height: 14px;
      background: rgba(255,255,255,.08);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      gap: 2px;
      padding: 2px;
    }

    .char-stat-fill {
      height: 100%;
      background: transparent;
      border-radius: 1px;
      position: relative;
    }

    /* 세그먼트 블록들을 CSS로 생성 */
    .char-stat-bar {
      position: relative;
    }

    .char-stat-fill {
      background: repeating-linear-gradient(
        90deg,
        #ff6b8a 0px,
        #ff6b8a 6px,
        transparent 6px,
        transparent 9px
      );
      box-shadow: 0 0 6px rgba(255,107,138,.4);
    }

    /* 오른쪽 사진 */
    .char-photo-area {
      flex-shrink: 0;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3/2.67;
      overflow: hidden;
      border-radius: 10px;
      position: relative;
    }


    .char-photo-slider {
      display: flex;
      width: 200%;
      height: 100%;
      transition: transform .4s ease;
    }

    .char-photo {
      width: 50%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: contrast(1.08) saturate(0.82) sepia(0.08) brightness(1.03);
    }

    /* 캠코더 비네팅 */
    .char-photo-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0,0,0,.35) 100%
      );
      pointer-events: none;
      z-index: 3;
      border-radius: 10px;
    }

    /* 좌우 화살표 — 이미지 좌/우에 붙음 */
    .char-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,140,160,.4);
      background: rgba(10,10,20,.7);
      color: rgba(255,180,190,.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      backdrop-filter: blur(4px);
    }

    .char-arrow:hover {
      background: rgba(255,100,140,.25);
      border-color: rgba(255,140,160,.7);
      color: #fff;
      box-shadow: 0 0 12px rgba(255,100,140,.3);
    }

    .char-arrow--left { left: 8px; }
    .char-arrow--right { right: 8px; }

    /* 도트 */
    .char-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .char-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background .3s, box-shadow .3s;
      cursor: pointer;
    }

    .char-dot.active {
      background: #ff8ca0;
      box-shadow: 0 0 6px rgba(255,140,160,.5);
    }

    /* 모바일 */
    @media (max-width: 600px) {
      .char-box { padding: 28px 20px 20px; }
      .char-inner { flex-direction: column-reverse; gap: 20px; }
      .char-photo-area { width: 100%; align-self: center; }
      .char-stats { gap: 10px; }
      .char-arrow--left { left: 6px; }
      .char-arrow--right { right: 6px; }
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream, #faf6f0);
      transition: opacity .4s, visibility .4s;
    }
    .loading-overlay.hide {
      opacity: 0;
      visibility: hidden;
    }
    .loading-ddakji {
      width: 200px;
      height: 200px;
      perspective: 400px;
      animation: ddakji-bounce .6s ease-in-out infinite;
    }
    .ddakji-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: ddakji-flip 1.2s ease-in-out infinite;
    }
    .ddakji-front, .ddakji-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--gold, #c9a96e);
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    .ddakji-front img, .ddakji-back img {
      width: 110%;
      height: 110%;
      margin: -5%;
      object-fit: cover;
    }
    .ddakji-back {
      transform: rotateY(180deg);
    }
    @keyframes ddakji-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }
    @keyframes ddakji-flip {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    /* ===== index.html people-section 스타일 통일 ===== */
    .person-body {
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255,180,220,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 30%, rgba(200,160,255,.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(255,200,150,.2) 0%, transparent 50%),
        linear-gradient(160deg, #2a1028 0%, #1a0a2e 40%, #0d0520 100%);
      background-attachment: fixed;
      color: #fff;
    }

    .loading-overlay {
      background: #1a0a2e;
    }
    .loading-ddakji .ddakji-front,
    .loading-ddakji .ddakji-back {
      border-color: rgba(255,140,160,.55);
    }

    /* nav — 다크 네온 */
    .person-nav {
      background: rgba(10,5,20,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,140,160,.2);
      box-shadow: 0 2px 20px rgba(0,0,0,.4);
    }
    .nav-back {
      color: rgba(255,180,210,.8);
      border-color: rgba(255,140,160,.3);
    }
    .nav-back:hover {
      background: rgba(255,100,140,.15);
      color: #fff;
    }
    .nav-person-btn {
      border-color: rgba(255,200,230,.2);
      color: rgba(255,200,230,.6);
    }
    .nav-person-btn:hover {
      border-color: rgba(255,140,160,.5);
      color: rgba(255,200,230,.9);
    }
    .nav-person-btn.active {
      background: rgba(255,100,140,.3);
      border-color: rgba(255,140,160,.6);
      color: #fff;
    }

    /* corkboard — 다크 테마 */
    .corkboard {
      background: transparent;
      min-height: calc(100vh - var(--nav-h, 56px) - 220px);
      padding: 40px 24px 100px;
    }

    /* postit — 밝은 파스텔 카드 (레트로) */
    .postit {
      background: var(--note-bg, #fef3e0);
      border: 1.5px solid rgba(0,0,0,.08);
      border-radius: 4px;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow:
        3px 4px 14px rgba(0,0,0,.18),
        inset 0 -3px 0 rgba(0,0,0,.06);
      transform: rotate(var(--rot, 0deg));
    }
    .postit:hover {
      transform: rotate(0deg) scale(1.04) translateY(-4px);
      border-color: rgba(0,0,0,.12);
      box-shadow:
        6px 8px 28px rgba(0,0,0,.22),
        inset 0 -3px 0 rgba(0,0,0,.06);
    }
    .postit::before {
      background: radial-gradient(circle at 35% 35%, #ff6b9d, #c0204a);
      box-shadow: 0 2px 6px rgba(0,0,0,.4), 0 0 8px rgba(255,100,140,.3);
    }
    .postit::after {
      display: block;
      border-color: transparent transparent rgba(0,0,0,.08) transparent;
    }
    .postit-message {
      color: #2c1810;
    }
    .postit-from {
      color: #6b3d2a;
      border-top-color: rgba(44,24,16,.15);
    }

    /* empty state */
    .empty-state .empty-text {
      color: rgba(255,200,230,.8);
    }
    .empty-state .empty-sub {
      color: rgba(255,180,210,.5);
    }

    /* 하단 이전/다음 버튼 */
    .arrow-btn {
      background: rgba(10,5,20,.8);
      color: rgba(255,180,210,.8);
      border-color: rgba(255,140,160,.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .arrow-btn:hover {
      background: rgba(255,100,140,.2);
      border-color: rgba(255,140,160,.5);
      color: #fff;
    }
  </style>
  <script src="js/paths.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var id = params.get('id');
      var folder = id && PEOPLE_FOLDER[id];
      var badges = id && PEOPLE_BADGES[id];
      if (folder && badges && badges.length > 0) {
        var imgs = badges.map(function(b) { return PEOPLE_DIR + '/' + folder + '/' + b; });
        var shuffled = imgs.sort(function() { return Math.random() - 0.5; });
        document.getElementById('ddakjiImg').src = shuffled[0];
        document.getElementById('ddakjiImgBack').src = shuffled[1 % shuffled.length];
      }
    })();
  </script>

  <!-- ===== NAV ===== -->
  <nav class="person-nav">
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      홈
    </a>
    <div class="nav-people-scroll" id="navPeopleScroll">
      <!-- JS로 렌더링 -->
    </div>
  </nav>

  <!-- ===== CHARACTER SELECT HERO ===== -->
  <section class="char-hero" id="personHeader">
    <div class="char-box">
      <div class="char-inner">
        <!-- 왼쪽: 텍스트 -->
        <div class="char-info">
          <span class="char-sub" id="personRoleBadge">//CHOOSE CHARACTER</span>
          <h1 class="char-name" id="personName"></h1>
          <div class="char-stats" id="charStats">
            <!-- JS에서 인물별 키워드 스탯으로 동적 렌더링 -->
          </div>
        </div>

        <!-- 오른쪽: 사진 슬라이더 -->
        <div class="char-photo-area">
          <button class="char-arrow char-arrow--left" id="charPrev">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="char-arrow char-arrow--right" id="charNext">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <div class="char-photo-slider" id="charSlider">
            <img src="" alt="" class="char-photo" id="personPhoto">
            <img src="" alt="" class="char-photo" id="personPhoto2">
          </div>
        </div>
      </div>

      <!-- 슬라이드 도트 -->
      <div class="char-dots" id="charDots">
        <span class="char-dot active"></span>
        <span class="char-dot"></span>
      </div>
    </div>
  </section>

  <!-- ===== CORKBOARD ===== -->
  <main class="corkboard">
    <div class="corkboard-inner" id="corkboardInner">
      <!-- JS로 렌더링 -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <p class="empty-emoji">✉️</p>
      <p class="empty-text">아직 메시지가 없어요</p>
      <p class="empty-sub">첫 번째 감사 메시지를 기다리는 중이에요</p>
    </div>
  </main>

  <!-- ===== PREV / NEXT ===== -->
  <div class="person-nav-arrows">
    <button class="arrow-btn" id="prevBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span id="prevName"></span>
    </button>
    <button class="arrow-btn arrow-btn-right" id="nextBtn" disabled>
      <span id="nextName"></span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- PapaParse CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/person.js"></script>
</body>
